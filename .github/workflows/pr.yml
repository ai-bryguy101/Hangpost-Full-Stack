# Phase 0 PR pipeline: lint + type-check + test + build for both apps,
# plus a filesystem vulnerability scan. Preview environments and the
# Playwright smoke suite land in later phases (see CLAUDE.md §7).

name: PR

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src
      - name: Pytest
        run: pytest

  web:
    name: Web (eslint + tsc + vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        # Clerk requires a publishable key at build time (NEXT_PUBLIC_* is
        # inlined into the client bundle). The placeholder value below is
        # never used for actual auth — the real key comes from Codespaces
        # secrets / Fly.io / Vercel — but Clerk will refuse to build without
        # something that parses as a key.
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2lhcmEtY2ktcGxhY2Vob2xkZXIkCg
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: false
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/web.Dockerfile
          push: false
          # See the "web" job above for why a placeholder key is needed.
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_Y2lhcmEtY2ktcGxhY2Vob2xkZXIkCg

  # NOTE: dependency/container vulnerability scanning (Trivy) is part of
  # Phase 6 (observability + hardening), where it becomes a blocking gate
  # with a pinned, verified action version. Omitted here to keep Phase 0
  # CI free of unverifiable external-action dependencies.
