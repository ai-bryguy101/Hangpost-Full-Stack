# Local dev stack: Postgres (PostGIS+pgvector) + Redis + API + Web.
# Run from anywhere with:  docker compose -f infra/compose/docker-compose.yml up
# Build contexts are the repo root so the Dockerfiles can see apps/.

name: hangpost

services:
  db:
    # PostGIS + pgvector; both extensions are created by the initial migration.
    build:
      context: ../..
      dockerfile: infra/docker/db.Dockerfile
    environment:
      POSTGRES_USER: hangpost
      POSTGRES_PASSWORD: hangpost
      POSTGRES_DB: hangpost
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hangpost -d hangpost"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: applies Alembic migrations, then exits. API waits on its success.
  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://hangpost:hangpost@db:5432/hangpost
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://hangpost:hangpost@db:5432/hangpost
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      # Clerk JWKS endpoint for JWT verification. Leave unset to keep the
      # auth-required endpoints disabled (every /me / profile call 503s).
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-}
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
      args:
        # NEXT_PUBLIC_* is baked into the client bundle at build time.
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
    environment:
      # Browser uses localhost (host port mapping); SSR inside the container
      # must reach the API by its compose service name.
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_INTERNAL_URL: http://api:8000
      # Clerk publishable key (browser-safe) + secret key (server-only).
      # Set both as Codespaces secrets to enable sign-in / sign-up; leave
      # unset and Clerk's UI components quietly degrade until they're set.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    ports: ["3000:3000"]
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
